name: workflow.yml
on:
  push:
    branches:
      - master
    paths-ignore:
      - "coverage-report/**"
      - "StrykerOutput/**"
      - "TestResults/**"

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for accurate results of code analysis

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install required tools
        run: | # Write the commands to install ReportGenerator and Stryker into your pipeline.
          dotnet tool install -g dotnet-reportgenerator-globaltool
          dotnet tool install -g dotnet-stryker

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./.sonar/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      - name: Build and analyze with SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./.sonar/scanner/dotnet-sonarscanner begin \
            /k:"BEL-DevOps-Calculator" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.host.url="${SONAR_HOST_URL}" \
            /d:sonar.exclusions="coverage-report/**,StrykerOutput/**,TestResults/**,client/dist/**" \
            /d:sonar.coverage.exclusions="coverage-report/**,StrykerOutput/**,TestResults/**" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"
          dotnet build
          dotnet test --no-build --collect:"XPlat Code Coverage" --results-directory ./TestResults/ -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
          ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

      - name: Debug - List coverage files
        if: always()
        run: |
          echo "Listing all coverage files:"
          find TestResults -name "*.xml" -type f
          echo ""
          echo "Checking first coverage file:"
          find TestResults -name "coverage.opencover.xml" -type f | head -1 | xargs ls -lh
          echo ""
          echo "Sample of coverage file content:"
          find TestResults -name "coverage.opencover.xml" -type f | head -1 | xargs head -20

      - name: Generate HTML Coverage Report
        run: | # Use the ReportGenerator tool to generate a report from the code coverage results
          reportgenerator -reports:TestResults/**/coverage.opencover.xml -targetdir:coverage-report -reporttypes:Html

      - name: Run Mutation Tests
        id: run-mutation-tests
        run: | # Write a command to execute mutation tests using Stryker with a threshold of 80% mutation score
          dotnet stryker --break-at 80

      - name: Export SonarQube Analysis Results
        id: export-sonar-results
        if: always()
        run: |
          mkdir -p sonarqube-report
          curl -u "${{ secrets.SONAR_TOKEN }}:" \
            "${{ secrets.SONAR_HOST_URL }}/api/measures/component?component=BEL-DevOps-Calculator&metricKeys=coverage,bugs,vulnerabilities,code_smells,security_hotspots,duplicated_lines_density,ncloc" \
            -o sonarqube-report/metrics.json
          curl -u "${{ secrets.SONAR_TOKEN }}:" \
            "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/project_status?projectKey=BEL-DevOps-Calculator" \
            -o sonarqube-report/quality-gate.json
          echo "# SonarQube Analysis Report" > sonarqube-report/README.md
          echo "" >> sonarqube-report/README.md
          echo "View full report at: ${{ secrets.SONAR_HOST_URL }}/dashboard?id=BEL-DevOps-Calculator" >> sonarqube-report/README.md
          echo "" >> sonarqube-report/README.md
          echo "Analysis completed at: $(date)" >> sonarqube-report/README.md

      - name: Collect SonarQube Report
        if: always() && steps.export-sonar-results.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-report
          path: sonarqube-report

      - name: Collect Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report
        # Complete this step sp it uploads the coverage report to the artifacts - make it run always even if previous steps fail

      - name: Collect Stryker Report
        if: always() && steps.run-mutation-tests.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: StrykerOutput
        # Complete this step so it uploads the Stryker report to the artifacts - make it run always even if previous steps fail
        
  versioning:
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for semantic versioning
          
      - name: Application version
        id: semver-app
        uses: paulhatch/semantic-version@v5.4.0
        with:
          bump-each-commit: true
          
      - name: Display version
        run: echo "Version: ${{ steps.semver-app.outputs.version }}"
